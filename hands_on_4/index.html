<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Header -->
    <header>

        <h2>Student Portal</h2>

        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Courses</a></li>
                <li><a href="#">Profile</a></li>
                <li><a href="#">Grades</a></li>
            </ul>
        </nav>

    </header>

    <!-- Hero Section -->
    <main>

        <section id="hero">

            <h1>Welcome to the Student Portal</h1>

            <p>
                Explore courses and manage your learning journey.
            </p>

            <button>Explore Courses</button>

        </section>

        <!-- Stats Section -->
        <section id="stats">

            <div class="stat-item">
                <h3>3</h3>
                <p>Courses Enrolled</p>
            </div>

            <div class="stat-item">
                <h3>3.8</h3>
                <p>GPA</p>
            </div>

            <div class="stat-item">
                <h3>6</h3>
                <p>Semester</p>
            </div>

        </section>

        <!-- Courses -->
        <section id="courses">

            <h2>Courses</h2>

            <input type="text" id="search-courses" placeholder="Search courses...">

            <button id="sort-btn">
                Sort by Credits
            </button>

            <p id="loading">Loading courses...</p>

            <div class="course-grid">

            </div>

            <div id="selected-course"></div>

            <p id="total-credits"></p>

        </section>
        <section id="notifications">

            <h2>Notifications</h2>

            <div id="notification-list"></div>

            <button id="retry-btn" style="display: none;">
                Retry
            </button>

        </section>

    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Student Portal</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script type="module" src="app.js"></script>

</body>

</html>
